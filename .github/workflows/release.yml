name: Deploy (release)

on:
  push:
    branches: [release]
  workflow_dispatch:

# Never run two deploys at once, and never cancel a deploy mid-flight.
concurrency:
  group: deploy-release
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      group: 3D-Printers
      labels: [self-hosted, linux]
    env:
      DEPLOY_DIR: /opt/prusahero
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck (server)
        run: yarn workspace @prusahero/server tsc

      - name: Test (server)
        run: yarn test

      - name: Build (client then server)
        run: yarn build

      # Build happens in the runner workspace; the live install lives in
      # $DEPLOY_DIR. Sync the freshly built tree across, preserving runtime
      # state that must never be overwritten (.env, database, media, backups).
      - name: Sync build into deploy dir
        run: |
          set -euo pipefail
          # Hard guard: refuse to rsync --delete into an unsafe target.
          # An empty/relative DEPLOY_DIR would resolve to "/" and wipe the host.
          case "${DEPLOY_DIR:-}" in
            /|"") echo "::error::DEPLOY_DIR is empty or '/'. Aborting." >&2; exit 1 ;;
            /*) : ;;
            *)  echo "::error::DEPLOY_DIR must be an absolute path. Aborting." >&2; exit 1 ;;
          esac
          if [ ! -d "$DEPLOY_DIR" ]; then
            echo "::error::DEPLOY_DIR '$DEPLOY_DIR' does not exist. Create it and chown it to the runner user." >&2
            exit 1
          fi
          rsync -a --delete \
            --exclude '.git/' \
            --exclude 'server/.env' \
            --exclude 'data/' \
            --exclude 'backups/' \
            ./ "$DEPLOY_DIR/"

      - name: Restart service
        run: sudo systemctl restart prusahero

      - name: Health check
        run: |
          sleep 5
          systemctl is-active --quiet prusahero
