# Local build + run. Used during development on the dev machine, and as the
# source of the image that gets pushed to GHCR (see `make publish`).
# For VM deployment use deploy/docker-compose.yml instead — it pulls the
# pre-built image from the registry without needing the source tree.

services:
  fdm-monster:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/jechandia/fdm-monster:${IMAGE_TAG:-latest}
    container_name: fdm-monster
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./data/media:/app/media
      - ./data/database:/app/database
    environment:
      SERVER_PORT: "4000"
      ENABLE_CLIENT_DIST_AUTO_UPDATE: "false"
      # JWT_SECRET: "change-me"
